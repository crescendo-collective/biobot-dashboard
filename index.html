<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script>
      // Runs before React mounts so there's no flash of the wrong
      // theme on load. Kept in sync with ThemeContext.tsx's storage key.
      // Theme switching is on hold, so default is dark (no OS-preference
      // fallback for now) — see the matching comment in ThemeContext.tsx.
      (function () {
        try {
          var stored = localStorage.getItem('dashboard-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
